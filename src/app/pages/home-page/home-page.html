<div mn-section="home">
  <div mn-section="top-section" id="top-section" >
    <app-parallax-component [data]="parallaxData"></app-parallax-component>
  </div>

  <button
    (click)="toggleLocale()"
    class="fixed top-24 right-4 z-50 rounded-full bg-white/90 px-4 py-2 text-sm font-medium shadow-md backdrop-blur hover:bg-white transition"
  >
    🌐 {{ currentLocale === 'en' ? 'NL' : 'EN' }}
  </button>


<div class="flex flex-col w-full gap-y-16 mt-16 px-8 xl:px-48   items-center ">
  <div mn-section="about-section" id="about-section" class="scroll-mt-20 w-full"><app-about-section></app-about-section></div>
  <div mn-section="packages-section" id="packages-section" class="scroll-mt-20 w-full"><app-packages-section></app-packages-section></div>
  <div mn-section="pictures-section" id="pictures-section" class="scroll-mt-20 w-full"><app-pictures-section></app-pictures-section></div>
  <div mn-section="contact-section" id="contact-section" class="scroll-mt-20 w-full"><app-contact-section></app-contact-section></div>
</div>
</div>
